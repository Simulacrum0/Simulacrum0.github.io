	<!--
	Programmatically a script and set it's innerHTML to what you want to execute. After that you can append it on top window's document head and the browser will execute it.

	Because your site has the Cross-Origin Embedder Policy (COEP) enabled, each resource must specify a suitable Cross-Origin Resource Policy (CORP). This behavior prevents a document from loading cross-origin resources which don’t explicitly grant permission to be loaded.

	To solve this, add the following to the resource’ response header:

	Cross-Origin-Resource-Policy: same-site if the resource and your site are served from the same site.
	Cross-Origin-Resource-Policy: cross-origin if the resource is served from another location than your website. ⚠️If you set this header, any website can embed this resource.
	Alternatively, the document can use the variant: Cross-Origin-Embedder-Policy: credentialless instead of require-corp. It allows loading the resource, despite the missing CORP header, at the cost of requesting it without credentials like Cookies.

	@ https://web.dev/articles/coop-coep?utm_source=devtools&utm_campaign=stable
	You can enable cross-origin isolation on a document embedded within an iframe by applying allow="cross-origin-isolated" permissions policy to the <iframe> tag and meeting the same conditions described in this document. Note that entire chain of the documents including parent frames and child frames must be cross-origin isolated as well.


		GOOG: https://developer.chrome.com/blog/iframe-credentialless/

		<iframe credentialless src="https://youtu.be/ztgM9Z34AUE"></iframe>

		<iframe credentialless src="https://youtu.be/ztgM9Z34AUE"></iframe>

 -->

	<iframe src="https://data.gov" width="640" height="480">IFRAME TEST</iframe>
	<fencedframe src="https://www.youtube.com/watch?v=zctTKdQcmVA" allow="geolocation 'src'" title="Advertisement for new Log. From Blammo!" width="640" height="480"></fencedframe>

	<iframe allow="cross-origin-isolated" src="https://weather.gov/"></iframe>
